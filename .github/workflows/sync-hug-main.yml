name: Sync to Hugging Face Space

on:
  push:
    branches: 
    - New 
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space with --force
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add space https://oauth2:$HF_TOKEN@huggingface.co/spaces/firdouszakheer/Demo
          git push space New:main --force
